<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="780" viewBox="0 0 1200 780" role="img" aria-labelledby="title desc">
  <title id="title">MemPalace 与传统摘要式记忆的对比</title>
  <desc id="desc">左侧展示传统摘要式记忆将对话压缩为 profile 和 summary，右侧展示 MemPalace 保留原文 drawer、空间结构和可回溯检索链。</desc>
  <defs>
    <style>
      .font { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; text-rendering: geometricPrecision; }
      .bg { fill: #f8f5ee; }
      .title { font-size: 34px; font-weight: 700; fill: #1d2a2a; }
      .subtitle { font-size: 18px; font-weight: 500; fill: #385050; }
      .label { font-size: 24px; font-weight: 700; fill: #1d2a2a; }
      .text { font-size: 18px; font-weight: 500; fill: #243535; }
      .small { font-size: 16px; font-weight: 500; fill: #385050; }
      .note { font-size: 18px; font-weight: 600; fill: #1d2a2a; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#58706a"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="780" rx="24"/>
  <text class="font title" x="56" y="68">图 1：MemPalace 不是让 AI 记住一个结论，而是先给它一座能回到原文的档案馆</text>
  <text class="font subtitle" x="56" y="104">真正的变化不在于“有没有 memory”，而在于系统默认保留什么、检索时又能回到哪里。</text>

  <rect x="58" y="142" width="500" height="540" rx="24" fill="#fffdf7" stroke="#ccb98f" stroke-width="3"/>
  <text class="font label" x="86" y="186">传统摘要式记忆</text>
  <text class="font small" x="86" y="214">核心逻辑：先压缩，再检索。</text>

  <rect x="88" y="250" width="440" height="92" rx="18" fill="#f4efe2" stroke="#c4ab72" stroke-width="2.5"/>
  <text class="font text" x="116" y="287">对话 / 文档 / 聊天记录</text>
  <text class="font small" x="116" y="316">原始上下文先进入系统</text>

  <line x1="308" y1="342" x2="308" y2="388" stroke="#7b6a43" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="88" y="396" width="440" height="92" rx="18" fill="#f8f3ea" stroke="#c4ab72" stroke-width="2.5"/>
  <text class="font text" x="116" y="433">Summary / Profile / Preference</text>
  <text class="font small" x="116" y="462">AI 决定“什么值得记住”</text>

  <line x1="308" y1="488" x2="308" y2="534" stroke="#7b6a43" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="88" y="542" width="440" height="92" rx="18" fill="#fbf7ee" stroke="#c4ab72" stroke-width="2.5"/>
  <text class="font text" x="116" y="579">检索到压缩后的结论</text>
  <text class="font small" x="116" y="608">快，但容易丢掉推理过程、时间关系和原文细节</text>

  <rect x="606" y="142" width="536" height="540" rx="24" fill="#fcfffb" stroke="#6c9a8f" stroke-width="3"/>
  <text class="font label" x="634" y="186">MemPalace 的档案式记忆</text>
  <text class="font small" x="634" y="214">核心逻辑：先保留原文，再分层唤醒和按需深搜。</text>

  <rect x="636" y="246" width="476" height="88" rx="18" fill="#eaf5f0" stroke="#6c9a8f" stroke-width="2.5"/>
  <text class="font text" x="664" y="281">对话 / 文档 / 项目碎片</text>
  <text class="font small" x="664" y="309">Claude Code、ChatGPT、Slack、plain text transcript</text>

  <line x1="874" y1="334" x2="874" y2="372" stroke="#58706a" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="636" y="382" width="220" height="112" rx="18" fill="#f3faf7" stroke="#6c9a8f" stroke-width="2.5"/>
  <text class="font text" x="664" y="419">Drawers</text>
  <text class="font small" x="664" y="448">逐字保存原文</text>
  <text class="font small" x="664" y="474">No summaries. Ever.</text>

  <rect x="892" y="382" width="220" height="112" rx="18" fill="#f3faf7" stroke="#6c9a8f" stroke-width="2.5"/>
  <text class="font text" x="920" y="419">Wings / Halls / Rooms</text>
  <text class="font small" x="920" y="448">把记忆组织成空间结构</text>
  <text class="font small" x="920" y="474">而不是一个平面向量池</text>

  <line x1="746" y1="494" x2="746" y2="540" stroke="#58706a" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1002" y1="494" x2="1002" y2="540" stroke="#58706a" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="636" y="548" width="476" height="94" rx="18" fill="#e7f1ff" stroke="#5f86ba" stroke-width="2.5"/>
  <text class="font text" x="664" y="585">Closets / Wake-up / Recall / KG</text>
  <text class="font small" x="664" y="614">先快速唤醒，再按主题和时间关系回到原文证据</text>

  <path d="M 558 412 C 598 412, 606 412, 622 412" fill="none" stroke="#d1c0a0" stroke-width="4" stroke-dasharray="8 8"/>
  <text class="font small" x="560" y="396">关键差异</text>
  <text class="font small" x="560" y="436">不是“记没记”</text>
  <text class="font small" x="560" y="460">而是“默认保留什么”</text>

  <text class="font note" x="58" y="736">结论：MemPalace 想做的不是更会总结的 memory，而是一个能让 AI 回到原文、时间线和空间结构的长期记忆外脑。</text>
</svg>
